steps:
  - name: calculate_aecis
    fmu: fmu/models/CalculateAECIs.fmu
    start_time: 0.0
    stop_time: 30.0
    step_size: 0.01
    input_series:
      csv: data/calculate_aecis_synthetic.csv
    outputs:
      - CIvector
      - time
    trace:
      outputs:
        - CIvector
      inputs:
        - rawsig
        - time_1
      sample_every: 0.05
    result: data/calculate_aecis_result.json
