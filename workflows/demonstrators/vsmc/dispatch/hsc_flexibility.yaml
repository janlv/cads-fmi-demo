metadata:
  display_name: VSMC HSC Flexibility
  site_id: vsmc
  category: dispatch
  result_family: storhy_mock
  description: Estimates balancing capacity and CO2 displacement from hydraulic short-circuit operation.
  tags: [vsmc, hsc, flexibility]
synthetic_case: data/storhy/synthetic/vsmc_cascade_high_cycling.yaml
steps:
  - name: hsc_flexibility
    fmu: fmu/models/HSCFlexibilityReplica.fmu
    start_time: 0.0
    stop_time: 48.0
    step_size: 1.0
    start_values: {site_id: 1, scenario_id: 3, profile_id: 3}
    outputs: [score, confidence, risk_index, status_code, recommendation_code, power_mw, flexibility_delta_percent, availability_delta_percent, value_delta_eur, opex_delta_eur, co2_delta_tonnes]
    trace:
      outputs: [power_mw, flexibility_delta_percent, risk_index]
      sample_every: 1.0
  - name: sustainability_cba
    fmu: fmu/models/SustainabilityCBAReplica.fmu
    start_time: 0.0
    stop_time: 48.0
    step_size: 1.0
    start_from:
      input_score: hsc_flexibility.score
      input_confidence: hsc_flexibility.confidence
      input_risk_index: hsc_flexibility.risk_index
      input_value_delta_eur: hsc_flexibility.value_delta_eur
      input_opex_delta_eur: hsc_flexibility.opex_delta_eur
      input_co2_delta_tonnes: hsc_flexibility.co2_delta_tonnes
      input_availability_delta_percent: hsc_flexibility.availability_delta_percent
      input_flexibility_delta_percent: hsc_flexibility.flexibility_delta_percent
    outputs: [score, confidence, risk_index, kpi_score, value_delta_eur, opex_delta_eur, co2_delta_tonnes, availability_delta_percent, flexibility_delta_percent]
  - name: kpi_assessment
    fmu: fmu/models/KPIAssessmentReplica.fmu
    start_time: 0.0
    stop_time: 48.0
    step_size: 1.0
    start_from:
      input_score: sustainability_cba.score
      input_confidence: sustainability_cba.confidence
      input_risk_index: sustainability_cba.risk_index
      input_value_delta_eur: sustainability_cba.value_delta_eur
      input_opex_delta_eur: sustainability_cba.opex_delta_eur
      input_co2_delta_tonnes: sustainability_cba.co2_delta_tonnes
      input_availability_delta_percent: sustainability_cba.availability_delta_percent
      input_flexibility_delta_percent: sustainability_cba.flexibility_delta_percent
    outputs: [score, confidence, risk_index, status_code, recommendation_code, kpi_score, value_delta_eur, co2_delta_tonnes, availability_delta_percent, flexibility_delta_percent]
    trace:
      outputs: [kpi_score, risk_index]
      sample_every: 1.0
    result: data/storhy/vsmc/dispatch/hsc_flexibility_result.json
