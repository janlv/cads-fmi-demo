metadata:
  display_name: VSMC Cascade Dispatch
  site_id: vsmc
  category: dispatch
  result_family: storhy_mock
  description: Optimises tandem pumping and cascade operation across Vouglans, Saut Mortier, and Coiselet.
  tags: [vsmc, dispatch, cascade, tandem-pumping]
synthetic_case: data/storhy/synthetic/vsmc_cascade_high_cycling.yaml
steps:
  - name: hydro_cascade_dispatch
    fmu: fmu/models/HydroCascadeDispatchReplica.fmu
    start_time: 0.0
    stop_time: 72.0
    step_size: 1.0
    start_values: {site_id: 1, scenario_id: 3, profile_id: 1}
    outputs: [score, confidence, risk_index, status_code, recommendation_code, power_mw, reservoir_level_m, flexibility_delta_percent, availability_delta_percent, value_delta_eur, opex_delta_eur, co2_delta_tonnes]
    trace:
      outputs: [power_mw, reservoir_level_m, flexibility_delta_percent, risk_index]
      sample_every: 2.0
  - name: start_sequence_wear
    fmu: fmu/models/StartSequenceWearReplica.fmu
    start_time: 0.0
    stop_time: 72.0
    step_size: 1.0
    start_values: {site_id: 1, scenario_id: 2, profile_id: 1}
    start_from:
      input_score: hydro_cascade_dispatch.score
      input_confidence: hydro_cascade_dispatch.confidence
      input_risk_index: hydro_cascade_dispatch.risk_index
      input_value_delta_eur: hydro_cascade_dispatch.value_delta_eur
      input_opex_delta_eur: hydro_cascade_dispatch.opex_delta_eur
      input_flexibility_delta_percent: hydro_cascade_dispatch.flexibility_delta_percent
    outputs: [score, confidence, risk_index, damage_index, rul_days, availability_delta_percent, flexibility_delta_percent, value_delta_eur, opex_delta_eur]
    trace:
      outputs: [damage_index, risk_index, rul_days]
      sample_every: 2.0
  - name: kpi_assessment
    fmu: fmu/models/KPIAssessmentReplica.fmu
    start_time: 0.0
    stop_time: 72.0
    step_size: 1.0
    start_from:
      input_score: start_sequence_wear.score
      input_confidence: start_sequence_wear.confidence
      input_risk_index: start_sequence_wear.risk_index
      input_value_delta_eur: start_sequence_wear.value_delta_eur
      input_opex_delta_eur: start_sequence_wear.opex_delta_eur
      input_rul_days: start_sequence_wear.rul_days
      input_availability_delta_percent: start_sequence_wear.availability_delta_percent
      input_flexibility_delta_percent: start_sequence_wear.flexibility_delta_percent
      input_co2_delta_tonnes: hydro_cascade_dispatch.co2_delta_tonnes
    outputs: [score, confidence, risk_index, status_code, recommendation_code, kpi_score, value_delta_eur, opex_delta_eur, co2_delta_tonnes, availability_delta_percent, flexibility_delta_percent, rul_days]
    trace:
      outputs: [kpi_score, risk_index]
      sample_every: 2.0
    result: data/storhy/vsmc/dispatch/cascade_dispatch_result.json
