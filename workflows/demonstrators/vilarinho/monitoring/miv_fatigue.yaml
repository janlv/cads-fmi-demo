metadata:
  display_name: Vilarinho MIV Fatigue
  site_id: vilarinho
  category: monitoring
  result_family: storhy_mock
  description: Estimates MIV fatigue risk from AE, pressure, vibration, and valve operating state.
  tags: [vilarinho, miv, fatigue, monitoring]
synthetic_case: data/storhy/synthetic/vilarinho_miv_hsc.yaml
steps:
  - name: condition_monitoring
    fmu: fmu/models/ConditionMonitoringReplica.fmu
    start_time: 0.0
    stop_time: 48.0
    step_size: 1.0
    start_values: {site_id: 5, scenario_id: 4, profile_id: 2, input_valve_opening_percent: 55.0}
    outputs: [score, confidence, risk_index, damage_index, rul_days, availability_delta_percent, valve_opening_percent]
    trace:
      outputs: [risk_index, damage_index, rul_days]
      sample_every: 1.0
  - name: miv_fatigue
    fmu: fmu/models/MIVFatigueReplica.fmu
    start_time: 0.0
    stop_time: 48.0
    step_size: 1.0
    start_values: {site_id: 5, scenario_id: 4, profile_id: 2, input_valve_opening_percent: 55.0}
    start_from:
      input_score: condition_monitoring.score
      input_confidence: condition_monitoring.confidence
      input_risk_index: condition_monitoring.risk_index
      input_damage_index: condition_monitoring.damage_index
      input_rul_days: condition_monitoring.rul_days
      input_availability_delta_percent: condition_monitoring.availability_delta_percent
    outputs: [score, confidence, risk_index, status_code, recommendation_code, valve_opening_percent, damage_index, rul_days, opex_delta_eur]
    trace:
      outputs: [damage_index, risk_index, rul_days]
      sample_every: 1.0
  - name: predictive_maintenance
    fmu: fmu/models/PredictiveMaintenanceReplica.fmu
    start_time: 0.0
    stop_time: 48.0
    step_size: 1.0
    start_from:
      input_score: miv_fatigue.score
      input_confidence: miv_fatigue.confidence
      input_risk_index: miv_fatigue.risk_index
      input_damage_index: miv_fatigue.damage_index
      input_rul_days: miv_fatigue.rul_days
      input_opex_delta_eur: miv_fatigue.opex_delta_eur
    outputs: [score, confidence, risk_index, damage_index, rul_days, availability_delta_percent, opex_delta_eur]
  - name: kpi_assessment
    fmu: fmu/models/KPIAssessmentReplica.fmu
    start_time: 0.0
    stop_time: 48.0
    step_size: 1.0
    start_from:
      input_score: predictive_maintenance.score
      input_confidence: predictive_maintenance.confidence
      input_risk_index: predictive_maintenance.risk_index
      input_opex_delta_eur: predictive_maintenance.opex_delta_eur
      input_rul_days: predictive_maintenance.rul_days
      input_availability_delta_percent: predictive_maintenance.availability_delta_percent
    outputs: [score, confidence, risk_index, status_code, recommendation_code, kpi_score, opex_delta_eur, availability_delta_percent, rul_days]
    trace:
      outputs: [kpi_score, risk_index]
      sample_every: 1.0
    result: data/storhy/vilarinho/monitoring/miv_fatigue_result.json
