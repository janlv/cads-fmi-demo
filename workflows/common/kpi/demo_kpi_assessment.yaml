metadata:
  display_name: Demo KPI Assessment
  site_id: portfolio
  category: kpi
  result_family: storhy_mock
  description: Shared KPI scoring workflow for proposal-style demonstrator reporting.
  tags: [kpi, reporting]
synthetic_case: data/storhy/synthetic/portfolio_common_case.yaml
steps:
  - name: kpi_assessment
    fmu: fmu/models/KPIAssessmentReplica.fmu
    start_time: 0.0
    stop_time: 12.0
    step_size: 1.0
    start_values:
      site_id: 0
      scenario_id: 2
      profile_id: 1
      input_score: 78.0
      input_risk_index: 0.24
      input_flexibility_delta_percent: 5.0
      input_availability_delta_percent: 2.5
      input_value_delta_eur: 32000.0
      input_co2_delta_tonnes: 750.0
    outputs: [score, confidence, risk_index, status_code, recommendation_code, kpi_score, value_delta_eur, co2_delta_tonnes, availability_delta_percent, flexibility_delta_percent]
    trace:
      outputs: [kpi_score, risk_index]
      sample_every: 1.0
    result: data/storhy/common/kpi/demo_kpi_assessment_result.json
